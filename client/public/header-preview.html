<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <title>Marketing Header Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: '#09090b',
            foreground: '#fafafa',
            muted: '#27272a',
            'muted-foreground': '#a1a1aa',
            border: '#27272a',
            primary: '#10b981',
            accent: '#27272a'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-background text-foreground h-screen antialiased">
  <header class="sticky top-0 z-50 w-full border-b border-border/70 bg-background/90 backdrop-blur-xl">
    <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
      
      <!-- Left: Logo & Navigation -->
      <div class="flex items-center gap-4 xl:gap-8">
        <a href="#" class="flex items-center gap-2 border-r border-border pr-4 text-2xl font-black tracking-tighter text-foreground xl:pr-6">
          CLASSGRID.
        </a>

        <!-- Desktop Menu -->
        <nav class="hidden lg:flex gap-1">
          <button class="px-3 py-2 text-sm font-medium text-muted-foreground hover:bg-accent hover:text-foreground rounded-lg transition">Platform</button>
          <button class="px-3 py-2 text-sm font-medium text-muted-foreground hover:bg-accent hover:text-foreground rounded-lg transition">Solutions</button>
          <button class="px-3 py-2 text-sm font-medium text-muted-foreground hover:bg-accent hover:text-foreground rounded-lg transition">Resources</button>
          <a href="#" class="px-3 py-2 text-sm font-medium text-muted-foreground hover:bg-accent hover:text-foreground rounded-lg transition">Pricing</a>
          <a href="#" class="px-3 py-2 text-sm font-medium text-muted-foreground hover:bg-accent hover:text-foreground rounded-lg transition">Blog</a>
        </nav>
      </div>

      <!-- Right: Trust Badge & CTA -->
      <div class="flex items-center gap-3">
        <div class="hidden items-center gap-2 rounded-full border border-border bg-muted px-3 py-1 text-xs text-muted-foreground xl:inline-flex">
          <span class="relative inline-flex h-2 w-2 rounded-[2px] bg-primary">
            <span class="absolute inset-0 animate-ping rounded-[2px] bg-primary/70"></span>
          </span>
          <span class="font-medium">Trusted by schools, colleges and coaching teams</span>
        </div>

        <a href="#" class="hidden lg:inline-flex px-4 py-2 bg-foreground text-background font-medium text-sm rounded-lg hover:bg-foreground/90 transition">
          Book a Demo
        </a>

        <button class="lg:hidden px-3 py-2 border border-border rounded-lg text-sm font-medium">
          Menu
        </button>
      </div>
    </div>
  </header>
  
  <div class="p-12 text-center text-muted-foreground">
    <p>This is a live HTML preview of the Marketing Next.js Header Component.</p>
  </div>
</body>
</html>
