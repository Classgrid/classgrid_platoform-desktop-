<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <script>
    try {
      var customFavicon = localStorage.getItem('org_favicon');
      var customTitle = localStorage.getItem('org_title');
      var hostname = window.location.hostname;
      var isMainPlatform = hostname.endsWith('classgrid.in') || hostname === 'localhost' || hostname === '127.0.0.1';

      if (isMainPlatform) {
        document.write('<link rel="icon" type="image/png" sizes="32x32" href="/logos/favicon-32x32.png?v=2" />');
        document.write('<link rel="icon" type="image/png" sizes="16x16" href="/logos/favicon-16x16.png?v=2" />');
        document.write('<link rel="icon" href="/logos/favicon.ico?v=2" sizes="48x48" />');
      } else if (customFavicon) {
        document.write('<link rel="icon" href="' + customFavicon + '" />');
      } else {
        // Generic Icon (Globe) to override default browser behavior which looks for /favicon.ico
        document.write('<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌐</text></svg>" />');
      }
      
      if (isMainPlatform) {
        document.write('<title>Classgrid ERP</title>');
      } else if (customTitle) {
        document.write('<title>' + customTitle + '</title>');
      } else {
        document.write('<title>Loading...</title>');
      }

      // Only load Classgrid manifest on the main platform
      if (isMainPlatform) {
        document.write('<link rel="manifest" href="/site.webmanifest" />');
      }
    } catch(e) {
      document.write('<title>Loading...</title>');
    }
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Fonts and Icons for Legacy matching -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #000;
      color: #fff;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
