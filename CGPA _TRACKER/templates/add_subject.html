{% extends "base.html" %}

{% block content %}
<section class="mx-auto max-w-3xl space-y-6">
    <div class="flex flex-wrap items-center justify-between gap-3">
        <div>
            <h2 class="font-display text-2xl font-bold sm:text-3xl">Add Subject</h2>
            <p class="mt-2 text-sm text-steel">Add a subject with credits and grade to compute weighted semester performance.</p>
        </div>
        <a href="{{ url_for('semester_detail', sem_id=sem_id) }}" class="rounded-xl border border-slate-200 bg-white px-4 py-2.5 text-sm font-bold text-ink transition hover:border-sea/30 hover:text-sea">
            Back to Semester
        </a>
    </div>

    <form method="POST" class="space-y-5 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
        <div class="grid gap-5 sm:grid-cols-2">
            <div class="space-y-2 sm:col-span-2">
                <label for="name" class="text-sm font-bold text-slate-700">Subject Name</label>
                <input
                    id="name"
                    name="name"
                    required
                    class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-ink outline-none transition focus:border-sea/60 focus:bg-white focus:ring-4 focus:ring-sea/10"
                    placeholder="e.g. Data Structures"
                >
            </div>

            <div class="space-y-2">
                <label for="credits" class="text-sm font-bold text-slate-700">Credits</label>
                <input
                    id="credits"
                    type="number"
                    name="credits"
                    min="1"
                    required
                    class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-ink outline-none transition focus:border-sea/60 focus:bg-white focus:ring-4 focus:ring-sea/10"
                    placeholder="e.g. 4"
                >
            </div>

            <div class="space-y-2">
                <label for="grade" class="text-sm font-bold text-slate-700">Grade</label>
                <select
                    id="grade"
                    name="grade"
                    required
                    class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-ink outline-none transition focus:border-sea/60 focus:bg-white focus:ring-4 focus:ring-sea/10"
                >
                    <option value="">Select Grade</option>
                    <option value="O">O</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                    <option value="F">F</option>
                </select>
            </div>
        </div>

        <div class="rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-xs text-slate-600">
            Grade points map: O=10, A=9, B=8, C=7, D=6, F=0.
        </div>

        <button type="submit" class="rounded-xl bg-gradient-to-r from-sea to-surf px-5 py-3 text-sm font-bold text-white shadow-glow transition hover:brightness-105">
            Save Subject
        </button>
    </form>
</section>
{% endblock %}
