<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGPA Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Sora:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ink: "#0e1a2b",
                        sea: "#0f7a89",
                        surf: "#13a2b8",
                        sunrise: "#ff8f3f",
                        cream: "#f8f5ef",
                        mint: "#c6f0e9",
                        steel: "#5f6f85"
                    },
                    fontFamily: {
                        body: ["Manrope", "sans-serif"],
                        display: ["Sora", "sans-serif"]
                    },
                    boxShadow: {
                        glow: "0 20px 40px -24px rgba(15, 122, 137, 0.45)"
                    },
                    keyframes: {
                        floaty: {
                            "0%, 100%": { transform: "translateY(0px)" },
                            "50%": { transform: "translateY(-10px)" }
                        },
                        fadeUp: {
                            "0%": { opacity: "0", transform: "translateY(18px)" },
                            "100%": { opacity: "1", transform: "translateY(0px)" }
                        }
                    },
                    animation: {
                        floaty: "floaty 7s ease-in-out infinite",
                        "fade-up": "fadeUp 0.7s ease-out forwards"
                    }
                }
            }
        };
    </script>
    <style>
        :root {
            --page-bg-a: #f6fbff;
            --page-bg-b: #fff8ef;
            --mesh-a: rgba(19, 162, 184, 0.14);
            --mesh-b: rgba(255, 143, 63, 0.14);
        }
    </style>
</head>
<body class="font-body text-ink min-h-screen bg-gradient-to-br from-[#f6fbff] via-[#fffef7] to-[#eef9ff]">
    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
        <div class="absolute -left-24 top-8 h-72 w-72 rounded-full bg-[var(--mesh-a)] blur-3xl animate-floaty"></div>
        <div class="absolute right-0 top-32 h-80 w-80 rounded-full bg-[var(--mesh-b)] blur-3xl animate-floaty [animation-delay:1.2s]"></div>
        <div class="absolute left-1/3 bottom-0 h-72 w-72 rounded-full bg-[var(--mesh-a)] blur-3xl animate-floaty [animation-delay:2.1s]"></div>
    </div>

    <header class="sticky top-0 z-30 border-b border-white/40 bg-white/70 backdrop-blur-xl">
        <nav class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-3 px-4 py-3 sm:px-6 lg:px-8">
            <a href="{{ url_for('home') }}" class="flex items-center gap-3">
                <span class="inline-flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-sea to-surf text-lg font-bold text-white shadow-glow">G</span>
                <div>
                    <p class="font-display text-lg font-bold leading-tight">CGPA Tracker</p>
                    <p class="text-xs text-steel">Study analytics dashboard</p>
                </div>
            </a>

            <div class="flex flex-wrap items-center gap-2 text-sm font-medium">
                <a href="{{ url_for('home') }}" class="rounded-full px-3 py-2 text-steel transition hover:bg-white hover:text-ink">Home</a>
                <a href="{{ url_for('add_semester') }}" class="rounded-full px-3 py-2 text-steel transition hover:bg-white hover:text-ink">Add Semester</a>
                <a href="{{ url_for('semesters') }}" class="rounded-full px-3 py-2 text-steel transition hover:bg-white hover:text-ink">Semesters</a>
                <a href="{{ url_for('cgpa') }}" class="rounded-full px-3 py-2 text-steel transition hover:bg-white hover:text-ink">CGPA</a>
                <a href="{{ url_for('analysis') }}" class="rounded-full px-3 py-2 text-steel transition hover:bg-white hover:text-ink">Analysis</a>
                <a href="{{ url_for('legal_center') }}" class="rounded-full px-3 py-2 text-steel transition hover:bg-white hover:text-ink">Legal</a>
            </div>
        </nav>
    </header>

    <main class="mx-auto w-full max-w-6xl px-4 py-8 sm:px-6 lg:px-8">
        <div class="animate-fade-up rounded-3xl border border-white/60 bg-white/70 p-5 shadow-glow backdrop-blur-xl sm:p-8">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <footer class="mx-auto mb-8 mt-2 w-full max-w-6xl px-4 sm:px-6 lg:px-8">
        <div class="rounded-3xl border border-white/60 bg-white/70 px-5 py-6 shadow-glow backdrop-blur-xl sm:px-8">
            <div class="flex flex-wrap items-start justify-between gap-4">
                <div>
                    <p class="font-display text-base font-bold">CGPA Tracker</p>
                    <p class="mt-1 text-sm text-steel">Clean grade analytics with transparent legal pages.</p>
                </div>
                <div class="flex flex-wrap gap-2 text-xs font-bold">
                    <a href="{{ url_for('privacy_policy') }}" class="rounded-full border border-slate-200 bg-white px-3 py-1.5 text-slate-700 transition hover:border-sea/30 hover:text-sea">Privacy</a>
                    <a href="{{ url_for('terms_and_conditions') }}" class="rounded-full border border-slate-200 bg-white px-3 py-1.5 text-slate-700 transition hover:border-sea/30 hover:text-sea">Terms</a>
                    <a href="{{ url_for('cookie_policy') }}" class="rounded-full border border-slate-200 bg-white px-3 py-1.5 text-slate-700 transition hover:border-sea/30 hover:text-sea">Cookies</a>
                    <a href="{{ url_for('disclaimer') }}" class="rounded-full border border-slate-200 bg-white px-3 py-1.5 text-slate-700 transition hover:border-sea/30 hover:text-sea">Disclaimer</a>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
