{% extends "base.html" %}

{% block content %}
<section class="mx-auto max-w-2xl space-y-6">
    <div>
        <h2 class="font-display text-2xl font-bold sm:text-3xl">Add Semester</h2>
        <p class="mt-2 text-sm text-steel">Create a new semester entry to start tracking its subjects and SGPA.</p>
    </div>

    <form method="post" class="space-y-5 rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
        <div class="space-y-2">
            <label for="semester_number" class="text-sm font-bold text-slate-700">Semester Number</label>
            <input
                id="semester_number"
                name="semester_number"
                type="number"
                min="1"
                required
                class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-ink outline-none transition focus:border-sea/60 focus:bg-white focus:ring-4 focus:ring-sea/10"
                placeholder="e.g. 5"
            >
        </div>

        <div class="flex flex-wrap gap-3">
            <button type="submit" class="rounded-xl bg-gradient-to-r from-sea to-surf px-5 py-3 text-sm font-bold text-white shadow-glow transition hover:brightness-105">
                Save Semester
            </button>
            <a href="{{ url_for('semesters') }}" class="rounded-xl border border-slate-200 bg-white px-5 py-3 text-sm font-bold text-ink transition hover:border-sea/30 hover:text-sea">
                Cancel
            </a>
        </div>
    </form>
</section>
{% endblock %}
