name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'server/**' # Only run when backend files change

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Go to the project folder
            cd ~/classgrid_platoform-desktop-
            
            # Pull the latest code from GitHub
            git pull origin main
            
            # Go into server folder, install new packages, and restart PM2
            cd server
            npm install
            pm2 restart classgrid-backend
